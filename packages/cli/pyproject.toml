[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "luonvuitoi-cert-cli"
version = "0.1.0"
description = "Scaffolder CLI for LUONVUITUOI-CERT toolkit (lvt-cert)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [{ name = "LUONVUITUOI-CERT contributors" }]
dependencies = [
    "typer>=0.9.0",
    "rich>=13.7.0",
    "jinja2>=3.1.0",
    "cryptography>=41.0.0",
    "luonvuitoi-cert>=0.1.0",
    "faker>=20.0.0",
    "openpyxl>=3.1.0",
    "flask>=2.3.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.4.0", "ruff>=0.1.0"]

[project.scripts]
lvt-cert = "luonvuitoi_cert_cli.main:app"
luonvuitoi-cert = "luonvuitoi_cert_cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["luonvuitoi_cert_cli"]
