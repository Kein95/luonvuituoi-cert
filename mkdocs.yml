site_name: LUONVUITUOI-CERT
site_description: Config-driven certificate portal toolkit — issue verifiable PDF certificates with QR verify, admin panel, and zero boilerplate.
site_url: https://kein95.github.io/luonvuituoi-cert
repo_url: https://github.com/Kein95/luonvuituoi-cert
repo_name: Kein95/luonvuituoi-cert
edit_uri: edit/main/docs/
docs_dir: docs
copyright: Copyright &copy; 2026 LUONVUITUOI-CERT — MIT License

theme:
  name: material
  language: en
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.tooltips
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Kein95/luonvuituoi-cert
      name: GitHub repository
    - icon: fontawesome/brands/python
      link: https://github.com/Kein95/luonvuituoi-cert/tree/main/packages
      name: Python packages
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - User guide: user-guide.md
  - Configuration: config-reference.md
  - Architecture: architecture.md
  - Guides:
      - PDF Overlay: pdf-overlay-guide.md
      - Admin Auth: admin-auth.md
      - Security: security.md
      - Operations: operations.md
      - Troubleshooting: troubleshooting.md
  - Deploy:
      - Vercel: deploy-vercel.md
      - Docker: deploy-docker.md
  - Features:
      - QR Verify: features/qr-verify.md
      - Shipment Tracking: features/shipment.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.mark
  - pymdownx.keys

plugins:
  - search:
      separator: '[\s\u200b\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
