site_name: LUONVUITUOI-CERT
site_description: Config-driven certificate portal toolkit
site_url: https://luonvuitoi.github.io/cert
repo_url: https://github.com/luonvuitoi/cert
repo_name: luonvuitoi/cert
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Configuration: config-reference.md
  - Guides:
      - PDF Overlay: pdf-overlay-guide.md
      - Admin Auth: admin-auth.md
  - Deploy:
      - Vercel: deploy-vercel.md
      - Docker: deploy-docker.md
  - Features:
      - QR Verify: features/qr-verify.md
      - Shipment Tracking: features/shipment.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

plugins:
  - search
