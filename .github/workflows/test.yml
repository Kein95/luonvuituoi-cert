name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core + cli (editable, with dev extras)
        run: |
          pip install --upgrade pip
          pip install -e ./packages/core[dev] -e ./packages/cli

      - name: Run unit + E2E test suite
        env:
          JWT_SECRET: ci-default-secret-padded-to-32-bytes-min
        run: pytest -ra --tb=short

      - name: Verify scaffolder scaffold round-trips
        run: |
          lvt-cert init /tmp/smoke --slug ci-smoke --non-interactive
          test -f /tmp/smoke/cert.config.json
          test -f /tmp/smoke/api/index.py
          test -f /tmp/smoke/vercel.json
