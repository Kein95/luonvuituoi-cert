name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: ruff check
        run: ruff check packages scripts
      - name: ruff format check
        run: ruff format --check packages scripts

  mypy:
    runs-on: ubuntu-latest
    # M1: promoted from advisory to blocking once the codebase cleared under
    # strict mode (2026-04-22). Re-adding continue-on-error here requires
    # explicit justification in CONTRIBUTING.md.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ./packages/core[dev] -e ./packages/cli mypy
      - run: mypy packages/core/luonvuitoi_cert packages/cli/luonvuitoi_cert_cli
