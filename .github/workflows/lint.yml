name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - name: ruff check
        run: ruff check packages scripts
      - name: ruff format check
        run: ruff format --check packages scripts

  mypy:
    runs-on: ubuntu-latest
    # Type checking is advisory while we iterate; failures are surfaced but
    # don't block the merge. Flip continue-on-error once the codebase is
    # clean under strict mode.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ./packages/core[dev] -e ./packages/cli mypy
      - run: mypy packages/core/luonvuitoi_cert packages/cli/luonvuitoi_cert_cli
